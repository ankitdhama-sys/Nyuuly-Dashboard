<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Data — Analytics Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Analytics Dashboard</div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/upload" class="active">Upload Data</a>
    </div>
  </nav>

  <div class="upload-page">
    <div class="upload-card">
      <h1>Upload CSV Data</h1>
      <p>Upload weekly exports from Instagram/Meta or Google Analytics 4. File type is auto-detected.</p>

      <form id="uploadForm">
        <div class="form-group">
          <label for="company">Company</label>
          <select id="company" name="company" required>
            <option value="nyuuly">Nyuuly</option>
            <option value="workjapan">WORK JAPAN</option>
          </select>
        </div>

        <div class="form-group">
          <label for="file">CSV File</label>
          <input type="file" id="file" name="file" accept=".csv" required>
        </div>

        <button type="submit" class="btn-primary" id="uploadBtn">Upload</button>
      </form>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Upload History</h2>
      </div>
      <div class="section-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Filename</th>
                <th>Company</th>
                <th>Type</th>
                <th>Added</th>
                <th>Skipped</th>
                <th>Uploaded At</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr><td colspan="6" class="empty-state">No uploads yet</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const form = document.getElementById('uploadForm');
    const uploadBtn = document.getElementById('uploadBtn');
    const historyBody = document.getElementById('historyBody');
    const toastContainer = document.getElementById('toastContainer');

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    function formatType(type) {
      const map = { social: 'Social Media', funnel: 'Funnel Data', traffic: 'Traffic Acquisition', pages: 'Pages & Screens' };
      return map[type] || type;
    }

    function formatCompany(c) {
      return c === 'workjapan' ? 'WORK JAPAN' : 'Nyuuly';
    }

    async function loadHistory() {
      try {
        const res = await fetch('/api/upload-history');
        const data = await res.json();

        if (!data.history.length) {
          historyBody.innerHTML = '<tr><td colspan="6" class="empty-state">No uploads yet</td></tr>';
          return;
        }

        historyBody.innerHTML = data.history.map(h => `
          <tr>
            <td>${escapeHtml(h.filename)}</td>
            <td>${formatCompany(h.company)}</td>
            <td>${formatType(h.file_type)}</td>
            <td>${h.rows_added}</td>
            <td>${h.rows_skipped}</td>
            <td>${h.uploaded_at}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Failed to load history:', err);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById('file');
      const company = document.getElementById('company').value;

      if (!fileInput.files.length) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('company', company);

      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData,
        });

        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Upload failed', 'error');
        } else {
          showToast(`${data.rowsAdded} rows added, ${data.rowsSkipped} duplicates skipped (${formatType(data.fileType)})`);
          fileInput.value = '';
          loadHistory();
        }
      } catch (err) {
        showToast('Upload failed: ' + err.message, 'error');
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload';
      }
    });

    loadHistory();
  </script>
</body>
</html>
